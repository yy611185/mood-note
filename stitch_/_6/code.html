<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>微光日记 - 记录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for horizontal scrolling elements */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#f8d8ff",
                        "surface-bright": "#fff8f7",
                        "secondary-container": "#b7e7f7",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#9ecede",
                        "on-primary-container": "#7b4542",
                        "inverse-primary": "#fcb4b0",
                        "on-tertiary-fixed-variant": "#5e376e",
                        "on-surface-variant": "#524342",
                        "on-surface": "#201a1a",
                        "tertiary": "#774f87",
                        "on-secondary-fixed": "#001f27",
                        "surface-container": "#f7ebea",
                        "secondary-fixed": "#baeafa",
                        "inverse-on-surface": "#faeeed",
                        "on-tertiary-container": "#6c447c",
                        "primary-fixed": "#ffdad7",
                        "on-tertiary-fixed": "#2e083f",
                        "primary-fixed-dim": "#fcb4b0",
                        "surface-dim": "#e3d7d6",
                        "on-secondary-fixed-variant": "#1a4d5a",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#f1e5e4",
                        "error": "#ba1a1a",
                        "surface-variant": "#ece0df",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "primary-container": "#ffb7b2",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#874f4c",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#ece0df",
                        "on-secondary-container": "#3a6977",
                        "on-background": "#201a1a",
                        "surface-tint": "#874f4c",
                        "inverse-surface": "#352f2e",
                        "outline-variant": "#d7c2c0",
                        "surface": "#fff8f7",
                        "outline": "#847372",
                        "surface-container-low": "#fdf1f0",
                        "tertiary-container": "#e8b8f8",
                        "on-primary-fixed": "#360e0d",
                        "on-primary-fixed-variant": "#6b3836",
                        "tertiary-fixed-dim": "#e6b6f6",
                        "background": "#fff8f7",
                        "secondary": "#356572"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "xl": "32px",
                        "lg": "24px",
                        "xs": "4px",
                        "unit": "4px",
                        "gutter": "16px",
                        "sm": "8px",
                        "md": "16px",
                        "xxl": "48px",
                        "container-padding": "24px"
                    },
                    fontFamily: {
                        "h1": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"]
                    },
                    fontSize: {
                        "h1": ["24px", { lineHeight: "1.5", letterSpacing: "0.01em", fontWeight: "600" }],
                        "label-sm": ["14px", { lineHeight: "1.4", letterSpacing: "0.05em", fontWeight: "500" }],
                        "body-md": ["16px", { lineHeight: "1.7", letterSpacing: "0.01em", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "1.8", letterSpacing: "0.01em", fontWeight: "400" }],
                        "h2": ["20px", { lineHeight: "1.5", letterSpacing: "0.01em", fontWeight: "500" }],
                        "display": ["32px", { lineHeight: "1.4", letterSpacing: "0.02em", fontWeight: "600" }],
                        "caption": ["12px", { lineHeight: "1.4", letterSpacing: "0.02em", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen selection:bg-primary-container selection:text-on-primary-container font-body-md antialiased pb-32">
<!-- TopAppBar -->
<!-- Main Content Canvas -->
<main class="max-w-2xl mx-auto px-container-padding flex flex-col gap-xl pt-10">
<!-- Header Section -->
<section class="flex flex-col gap-sm">
<h2 class="font-display text-display text-on-background">今天，5月3日</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">今天感觉怎么样？</p>
</section>
<!-- Mood Section -->
<section class="flex flex-col gap-md">
<div class="flex items-center gap-sm overflow-x-auto no-scrollbar pb-xs">
<button class="text-[32px] p-sm hover:scale-110 transition-transform flex-shrink-0">😆</button>
<div class="flex flex-col items-center flex-shrink-0 bg-surface-container rounded-full p-xs px-md shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-surface-variant/50">
<span class="text-[32px]">😊</span>
<span class="font-caption text-caption text-primary">开心</span>
</div>
<button class="text-[32px] p-sm hover:scale-110 transition-transform opacity-70 flex-shrink-0">😌</button>
<button class="text-[32px] p-sm hover:scale-110 transition-transform opacity-70 flex-shrink-0">😐</button>
<button class="text-[32px] p-sm hover:scale-110 transition-transform opacity-70 flex-shrink-0">😮‍💨</button>
<button class="text-[32px] p-sm hover:scale-110 transition-transform opacity-70 flex-shrink-0">😟</button>
<button class="text-[32px] p-sm hover:scale-110 transition-transform opacity-70 flex-shrink-0">😢</button>
<button class="text-[32px] p-sm hover:scale-110 transition-transform opacity-70 flex-shrink-0">😠</button>
<button class="text-[32px] p-sm hover:scale-110 transition-transform opacity-70 flex-shrink-0">✨</button>
</div>
</section>
<!-- What I Did Section -->
<section class="flex flex-col gap-sm">
<label class="font-h2 text-h2 text-on-background">今天做了什么？</label>
<div class="bg-surface-container-lowest rounded-lg p-md shadow-[0_8px_30px_rgb(0,0,0,0.02)] border border-surface-variant/30 transition-all focus-within:shadow-[0_8px_30px_rgb(135,79,76,0.08)]">
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-md text-body-md text-on-surface placeholder:text-outline/50 p-0" placeholder="写下今天的零碎想法..." rows="4"></textarea>
</div>
</section>
<!-- Emotion Cards Grid -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Happy Card -->
<div class="bg-primary-container rounded-lg p-lg flex flex-col gap-sm shadow-[0_8px_30px_rgb(255,183,178,0.15)] transition-transform hover:-translate-y-1 duration-300">
<div class="flex items-center gap-xs text-on-primary-container">
<span class="material-symbols-outlined" data-icon="favorite" data-weight="fill" style="font-variation-settings: 'FILL' 1;">favorite</span>
<h3 class="font-label-sm text-label-sm font-bold">让我开心的事</h3>
</div>
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-md text-body-md text-on-primary-container placeholder:text-on-primary-container/50 p-0" placeholder="比如：喝到了一杯好咖啡" rows="2"></textarea>
</div>
<!-- Unhappy Card -->
<div class="bg-secondary-container rounded-lg p-lg flex flex-col gap-sm shadow-[0_8px_30px_rgb(183,231,247,0.15)] transition-transform hover:-translate-y-1 duration-300">
<div class="flex items-center gap-xs text-on-secondary-container">
<span class="material-symbols-outlined" data-icon="rainy" data-weight="fill" style="font-variation-settings: 'FILL' 1;">rainy</span>
<h3 class="font-label-sm text-label-sm font-bold">让我不开心的事</h3>
</div>
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-md text-body-md text-on-secondary-container placeholder:text-on-secondary-container/50 p-0" placeholder="轻轻放下它..." rows="2"></textarea>
</div>
</section>
<!-- Photo Section -->
<section class="flex flex-col gap-sm">
<label class="font-h2 text-h2 text-on-background">今日照片</label>
<button class="w-full bg-surface-container-lowest border-2 border-dashed border-outline-variant/60 rounded-lg h-32 flex flex-col items-center justify-center gap-xs text-outline hover:bg-surface-variant/50 hover:border-primary/40 transition-colors duration-300">
<span class="material-symbols-outlined text-3xl" data-icon="add_a_photo">add_a_photo</span>
<span class="font-caption text-caption">添加一张照片留念</span>
</button>
</section>
<!-- Tags Section -->
<section class="flex flex-col gap-sm">
<label class="font-h2 text-h2 text-on-background">生活标签</label>
<div class="flex flex-wrap gap-sm">
<button class="bg-surface-variant text-on-surface-variant font-caption text-caption px-4 py-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors border border-transparent">学习</button>
<button class="bg-surface-variant text-on-surface-variant font-caption text-caption px-4 py-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors border border-transparent">编程</button>
<button class="bg-surface-variant text-on-surface-variant font-caption text-caption px-4 py-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors border border-transparent">阅读</button>
<button class="bg-surface-variant text-on-surface-variant font-caption text-caption px-4 py-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors border border-transparent">运动</button>
<button class="bg-primary-container text-on-primary-container font-caption text-caption px-4 py-2 rounded-full shadow-sm border border-primary/10">散步</button>
<button class="bg-surface-variant text-on-surface-variant font-caption text-caption px-4 py-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors border border-transparent">朋友</button>
<button class="bg-surface-variant text-on-surface-variant font-caption text-caption px-4 py-2 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors border border-transparent">家人</button>
<button class="bg-surface-container-lowest text-outline font-caption text-caption w-8 h-8 rounded-full flex items-center justify-center border border-dashed border-outline-variant hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[16px]" data-icon="add">add</span>
</button>
</div>
</section>
<!-- Action Widgets -->
<section class="flex flex-col sm:flex-row gap-md mt-sm">
<button class="flex-1 bg-tertiary-container text-on-tertiary-container rounded-lg p-md flex items-center justify-between shadow-[0_4px_20px_rgb(232,184,248,0.15)] hover:-translate-y-1 transition-transform duration-300">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-label-sm text-label-sm font-bold">AI 温柔总结</span>
</div>
<span class="material-symbols-outlined text-[20px] opacity-70" data-icon="chevron_right">chevron_right</span>
</button>
<button class="flex-1 bg-surface-container-high text-on-surface rounded-lg p-md flex items-center justify-between shadow-[0_4px_20px_rgb(0,0,0,0.02)] hover:-translate-y-1 transition-transform duration-300 border border-surface-variant">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary" data-icon="history_edu">history_edu</span>
<span class="font-label-sm text-label-sm font-medium">写给未来的自己</span>
</div>
<span class="material-symbols-outlined text-[20px] opacity-70" data-icon="chevron_right">chevron_right</span>
</button>
</section>
<!-- Save Action -->
<div class="mt-md flex justify-center pb-md">
<button class="bg-primary text-on-primary font-label-sm text-label-sm px-xxl py-4 rounded-full shadow-[0_8px_30px_rgb(135,79,76,0.2)] hover:bg-primary/90 active:scale-95 transition-all duration-300 w-full md:w-auto min-w-[200px]">
                保存今天
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-3 bg-white/90 dark:bg-stone-900/90 backdrop-blur-xl rounded-t-[32px] border-t border-stone-100/50 dark:border-stone-800/50 shadow-[0_-10px_40px_rgba(255,183,178,0.08)]">
<!-- Inactive Tab -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:bg-rose-50/30 dark:hover:bg-rose-900/10 active:scale-95 transition-transform duration-200 w-16 h-12 rounded-2xl">
<span class="material-symbols-outlined mb-1" data-icon="calendar_today">calendar_today</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">日历</span>
</button>
<!-- Active Tab (记录) -->
<button class="flex flex-col items-center justify-center text-rose-400 dark:text-rose-300 bg-rose-50/50 dark:bg-rose-900/20 rounded-full px-5 py-1 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="add_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium font-bold">记录</span>
</button>
<!-- Inactive Tab -->
<button class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 hover:bg-rose-50/30 dark:hover:bg-rose-900/10 active:scale-95 transition-transform duration-200 w-16 h-12 rounded-2xl">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] text-[11px] font-medium">我的</span>
</button>
</nav>
</body></html>
