<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>心情趋势</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#f8d8ff",
                        "surface-bright": "#fff8f7",
                        "secondary-container": "#b7e7f7",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#9ecede",
                        "on-primary-container": "#7b4542",
                        "inverse-primary": "#fcb4b0",
                        "on-tertiary-fixed-variant": "#5e376e",
                        "on-surface-variant": "#524342",
                        "on-surface": "#201a1a",
                        "tertiary": "#774f87",
                        "on-secondary-fixed": "#001f27",
                        "surface-container": "#f7ebea",
                        "secondary-fixed": "#baeafa",
                        "inverse-on-surface": "#faeeed",
                        "on-tertiary-container": "#6c447c",
                        "primary-fixed": "#ffdad7",
                        "on-tertiary-fixed": "#2e083f",
                        "primary-fixed-dim": "#fcb4b0",
                        "surface-dim": "#e3d7d6",
                        "on-secondary-fixed-variant": "#1a4d5a",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#f1e5e4",
                        "error": "#ba1a1a",
                        "surface-variant": "#ece0df",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "primary-container": "#ffb7b2",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#874f4c",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#ece0df",
                        "on-secondary-container": "#3a6977",
                        "on-background": "#201a1a",
                        "surface-tint": "#874f4c",
                        "inverse-surface": "#352f2e",
                        "outline-variant": "#d7c2c0",
                        "surface": "#fff8f7",
                        "outline": "#847372",
                        "surface-container-low": "#fdf1f0",
                        "tertiary-container": "#e8b8f8",
                        "on-primary-fixed": "#360e0d",
                        "on-primary-fixed-variant": "#6b3836",
                        "tertiary-fixed-dim": "#e6b6f6",
                        "background": "#fff8f7",
                        "secondary": "#356572"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xl": "32px",
                        "lg": "24px",
                        "xs": "4px",
                        "unit": "4px",
                        "gutter": "16px",
                        "sm": "8px",
                        "md": "16px",
                        "xxl": "48px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "h1": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "h1": ["24px", { "lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "label-sm": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.7", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.8", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "h2": ["20px", { "lineHeight": "1.5", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display": ["32px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "caption": ["12px", { "lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .ambient-shadow {
            box-shadow: 0 10px 40px -10px rgba(135, 79, 76, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen pb-24">
<!-- Top Navigation (Task-focused sub-page, suppressing global nav features, using simple back) -->
<header class="flex items-center w-full px-4 h-16 bg-surface-bright/80 backdrop-blur-md sticky top-0 z-40 transition-all duration-300">
<div class="flex-1">
<button aria-label="Back" class="text-on-surface-variant hover:bg-surface-variant rounded-full p-2 transition-all duration-300 active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-h1 text-h1 text-on-background whitespace-nowrap">心情趋势</h1>
<div class="flex-1 flex justify-end"></div>
</header>
<main class="px-container-padding pt-md space-y-lg max-w-2xl mx-auto">
<!-- Time Range Tabs -->
<div class="flex justify-center mb-lg">
<div class="bg-surface-container-high rounded-full p-1 flex shadow-[0_2px_10px_rgba(135,79,76,0.03)]">
<button class="bg-primary-container text-on-primary-container rounded-full px-6 py-2 font-label-sm text-label-sm transition-all duration-300">最近7天</button>
<button class="text-on-surface-variant rounded-full px-6 py-2 font-label-sm text-label-sm hover:bg-surface-variant/50 transition-all duration-300">最近30天</button>
</div>
</div>
<!-- Chart Area -->
<section class="bg-surface-container-lowest rounded-DEFAULT ambient-shadow p-6 flex flex-col items-center">
<div class="w-full flex justify-between items-center mb-6">
<span class="font-body-md text-body-md text-on-surface-variant">心情起伏</span>
<span class="material-symbols-outlined text-outline" data-icon="show_chart">show_chart</span>
</div>
<!-- Minimalist Wavy Line Representation (CSS Based) -->
<div class="relative w-full h-48 mt-4">
<!-- Grid Lines -->
<div class="absolute inset-0 flex flex-col justify-between">
<div class="w-full h-px bg-outline-variant/30"></div>
<div class="w-full h-px bg-outline-variant/30"></div>
<div class="w-full h-px bg-outline-variant/30"></div>
<div class="w-full h-px bg-outline-variant/30"></div>
</div>
<!-- SVG Wavy Line -->
<svg class="absolute inset-0 w-full h-full overflow-visible" preserveaspectratio="none" viewbox="0 0 100 100">
<path d="M0,50 Q10,20 25,40 T50,60 T75,30 T100,50" fill="none" stroke="#ffb7b2" stroke-linecap="round" stroke-width="3"></path>
<!-- Gradient Fill Under Line -->
<path d="M0,50 Q10,20 25,40 T50,60 T75,30 T100,50 L100,100 L0,100 Z" fill="url(#lineGradient)" opacity="0.3"></path>
<defs>
<lineargradient id="lineGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#ffb7b2"></stop>
<stop offset="100%" stop-color="#fff8f7" stop-opacity="0"></stop>
</lineargradient>
</defs>
</svg>
<!-- Data Points (Emojis) -->
<div class="absolute inset-0">
<div class="absolute top-[50%] left-[0%] -translate-x-1/2 -translate-y-1/2 text-2xl drop-shadow-sm">😌</div>
<div class="absolute top-[34%] left-[25%] -translate-x-1/2 -translate-y-1/2 text-2xl drop-shadow-sm">😊</div>
<div class="absolute top-[55%] left-[50%] -translate-x-1/2 -translate-y-1/2 text-2xl drop-shadow-sm">😐</div>
<div class="absolute top-[35%] left-[75%] -translate-x-1/2 -translate-y-1/2 text-2xl drop-shadow-sm">🥰</div>
<div class="absolute top-[50%] left-[100%] -translate-x-1/2 -translate-y-1/2 text-2xl drop-shadow-sm">😌</div>
</div>
</div>
<!-- X Axis Labels -->
<div class="w-full flex justify-between mt-4 font-caption text-caption text-outline">
<span>周一</span>
<span>周三</span>
<span>周五</span>
<span>今日</span>
</div>
</section>
<!-- Analysis & Insights -->
<section class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Average Mood -->
<div class="bg-surface-container-lowest rounded-DEFAULT ambient-shadow p-6 flex items-center justify-between">
<div>
<h3 class="font-label-sm text-label-sm text-on-surface-variant mb-1">本月平均心情</h3>
<p class="font-h2 text-h2 text-primary">平稳放松</p>
</div>
<div class="text-5xl drop-shadow-md">😊</div>
</div>
<!-- Insight Text -->
<div class="bg-primary-container/20 rounded-DEFAULT ambient-shadow p-6 relative overflow-hidden">
<div class="absolute -right-6 -top-6 text-primary/10">
<span class="material-symbols-outlined text-[100px]" data-icon="psychology">psychology</span>
</div>
<h3 class="font-label-sm text-label-sm text-on-primary-container mb-2 flex items-center gap-2 relative z-10">
<span class="material-symbols-outlined text-sm" data-icon="lightbulb">lightbulb</span>
                    心情洞察
                </h3>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed relative z-10">
                    这个月你的心情整体比较平稳。带有<span class="text-primary font-medium">‘运动’</span>标签的日子，心情通常更好。继续保持！
                </p>
</div>
</section>
<!-- Mood Distribution -->
<section class="bg-surface-container-lowest rounded-DEFAULT ambient-shadow p-6">
<h3 class="font-h2 text-h2 text-on-background mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="pie_chart">pie_chart</span>
                心情分布
            </h3>
<div class="space-y-4">
<!-- Bar 1 -->
<div class="flex items-center gap-4">
<div class="text-2xl w-8">😊</div>
<div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full" style="width: 45%;"></div>
</div>
<div class="font-caption text-caption text-on-surface-variant w-10 text-right">45%</div>
</div>
<!-- Bar 2 -->
<div class="flex items-center gap-4">
<div class="text-2xl w-8">😌</div>
<div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-secondary-container rounded-full" style="width: 30%;"></div>
</div>
<div class="font-caption text-caption text-on-surface-variant w-10 text-right">30%</div>
</div>
<!-- Bar 3 -->
<div class="flex items-center gap-4">
<div class="text-2xl w-8">😐</div>
<div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-tertiary-container rounded-full" style="width: 15%;"></div>
</div>
<div class="font-caption text-caption text-on-surface-variant w-10 text-right">15%</div>
</div>
<!-- Bar 4 -->
<div class="flex items-center gap-4">
<div class="text-2xl w-8">😔</div>
<div class="flex-1 h-3 bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-outline-variant rounded-full" style="width: 10%;"></div>
</div>
<div class="font-caption text-caption text-on-surface-variant w-10 text-right">10%</div>
</div>
</div>
</section>
</main>
<!-- Suppressed Bottom Navigation: Not a top-level destination, task-focused screen -->
</body></html>
